name: study02_nu1e-1
description: "Study 2 collisionality scan: nu1e-1, M=32, benchmark params"

grid:
  Nx: 64
  Ny: 64
  Nz: 32
  Lx: 1.0
  Ly: 1.0
  Lz: 1.0

physics:
  v_A: 1.0
  eta: 2.0
  nu: 0.1
  beta_i: 1.0
  Lambda: 2.236
  hyper_r: 2
  hyper_n: 2

initial_condition:
  type: random_spectrum
  amplitude: 0.05
  alpha: 1.667
  k_min: 1.0
  k_max: 10.0
  k_wave: [0.0, 0.0, 1.0]
  M: 32

forcing:
  enabled: true
  amplitude: 0.005
  k_min: 1.0
  k_max: 2.0

time_integration:
  n_steps: 10000
  cfl_safety: 0.3
  save_interval: 100

io:
  output_dir: data
  save_spectra: true
  save_energy_history: true
  save_fields: false
  save_final_state: true
  overwrite: false
