name: study02_nu1e-5
description: "Study 2 collisionality scan: nu1e-5, M=128, low-kz Alfvén forcing"

grid:
  Nx: 64
  Ny: 64
  Nz: 32
  Lx: 1.0
  Ly: 1.0
  Lz: 1.0

physics:
  v_A: 1.0
  eta: 2.0
  nu: 0.00001
  beta_i: 1.0
  Lambda: 2.236
  hyper_r: 2
  hyper_n: 6

initial_condition:
  type: random_spectrum
  amplitude: 0.05
  alpha: 1.667
  k_min: 1.0
  k_max: 10.0
  k_wave: [0.0, 0.0, 1.0]
  M: 128

forcing:
  enabled: true
  amplitude: 0.005
  k_min: 1.0
  k_max: 2.0
  mode: gandalf_perp_lowkz
  max_nz: 1
  include_nz0: false

hermite_forcing:
  amplitude: 0.0035
  forced_moments: [0]
  mode: perp_lowkz
  max_nz: 1
  include_nz0: false

hermite_seed:
  enabled: true
  amplitude: 0.001
  seed: 137

time_integration:
  n_steps: 200000
  cfl_safety: 0.3
  save_interval: 1000

io:
  output_dir: data
  save_spectra: true
  save_energy_history: true
  save_fields: false
  save_final_state: true
  overwrite: false
